%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------
File.version: "1.0"
Camera.type: "PinHole"

# LEFT Infrared Camera (Camera 1)
Camera1.fx: 429.78046
Camera1.fy: 429.78046
Camera1.cx: 429.94278
Camera1.cy: 241.57314
Camera1.k1: 0.00000
Camera1.k2: 0.00000
Camera1.p1: 0.00000
Camera1.p2: 0.00000

# RIGHT Infrared Camera (Camera 2)
Camera2.fx: 429.78046
Camera2.fy: 429.78046
Camera2.cx: 429.94278
Camera2.cy: 241.57314
Camera2.k1: 0.00000
Camera2.k2: 0.00000
Camera2.p1: 0.00000
Camera2.p2: 0.00000

Camera.width: 848
Camera.height: 480
Camera.fps: 30
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# Stereo Parameters
#--------------------------------------------------------------------------------------------
Stereo.ThDepth: 40.0
Stereo.b: 0.095007

# Transformation from Camera 2 (Right) to Camera 1 (Left)
Stereo.T_c1_c2: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [1.000000, 0.000000, 0.000000, 0.095007,
          0.000000, 1.000000, 0.000000, 0.000000,
          0.000000, 0.000000, 1.000000, 0.000000,
          0.000000, 0.000000, 0.000000, 1.000000]

#--------------------------------------------------------------------------------------------
# IMU Parameters
#--------------------------------------------------------------------------------------------
# ⚠️ 重要：这里的变量名已适配 tum_vi 示例程序
IMU.NoiseGyro: 0.002
IMU.NoiseAcc: 0.02
IMU.GyroWalk: 0.00002
IMU.AccWalk: 0.0002
IMU.Frequency: 200.0

# ⚠️ 关键：从 IMU 到左相机的变换矩阵
IMU.T_b_c1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [1.000000, 0.000000, 0.000000, 0.030220,
          0.000000, 1.000000, 0.000000, -0.007400,
          0.000000, 0.000000, 1.000000, -0.016020,
          0.000000, 0.000000, 0.000000, 1.000000]

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures: 1200
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -3.5
Viewer.ViewpointF: 500.0